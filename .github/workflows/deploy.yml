name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "medpilot-site/**"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: medpilot-site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: medpilot-site
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: medpilot-site
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: medpilot-site/dist

      - id: deployment
        uses: actions/deploy-pages@v4
